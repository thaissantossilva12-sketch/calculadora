<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calculadora {
        background: #222;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
    }

    #display {
        width: 100%;
        height: 60px;
        font-size: 24px;
        text-align: right;
        margin-bottom: 10px;
        border: none;
        border-radius: 5px;
        padding: 10px;
        box-sizing: border-box;
    }

    .botoes {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        height: 60px;
        font-size: 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.9;
    }

    .operador {
        background: #ff9500;
        color: white;
    }

    .numero {
        background: #444;
        color: white;
    }

    .igual {
        background: #28a745;
        color: white;
    }

    .limpar {
        background: #dc3545;
        color: white;
    }
</style>
</head>
<body>

<div class="calculadora">
    <input type="text" id="display" readonly>

    <div class="botoes">
        <button class="limpar" onclick="limpar()">C</button>
        <button class="operador" onclick="adicionar('/')">÷</button>
        <button class="operador" onclick="adicionar('*')">×</button>
        <button class="operador" onclick="adicionar('-')">−</button>

        <button class="numero" onclick="adicionar('7')">7</button>
        <button class="numero" onclick="adicionar('8')">8</button>
        <button class="numero" onclick="adicionar('9')">9</button>
        <button class="operador" onclick="adicionar('+')">+</button>

        <button class="numero" onclick="adicionar('4')">4</button>
        <button class="numero" onclick="adicionar('5')">5</button>
        <button class="numero" onclick="adicionar('6')">6</button>
        <button class="igual" onclick="calcular()">=</button>

        <button class="numero" onclick="adicionar('1')">1</button>
        <button class="numero" onclick="adicionar('2')">2</button>
        <button class="numero" onclick="adicionar('3')">3</button>
        <button class="numero" onclick="adicionar('.')">.</button>

        <button class="numero" onclick="adicionar('0')" style="grid-column: span 4;">
            0
        </button>
    </div>
</div>

<script>
    function adicionar(valor) {
        document.getElementById('display').value += valor;
    }

    function limpar() {
        document.getElementById('display').value = '';
    }

    function calcular() {
        const display = document.getElementById('display');

        try {
            display.value = eval(display.value);
        } catch {
            display.value = 'Erro';
        }
    }
</script>

</body>
</html>
